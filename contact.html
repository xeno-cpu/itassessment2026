<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HMIS - Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        form {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 700px;
            margin: 30px auto;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #003087;
            border-radius: 6px;
            font-size: 1.1em;
        }
        input:focus, textarea:focus {
            border-color: #00aaff;
            outline: none;
        }
        button {
            background: #00aaff;
            color: white;
            padding: 14px 30px;
            border: none;
            border-radius: 6px;
            font-size: 1.1em;
            cursor: pointer;
        }
        button:hover {
            background: #003087;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="patients.html">Patients</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    <h1 style="text-align:center;">Get in Touch</h1>
    <form id="contactForm">
        <label>Name:</label>
        <input type="text" id="name" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Message:</label>
        <textarea id="message" rows="6" required></textarea>

        <button type="submit">Send Message</button>
    </form>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            let email = document.getElementById('email').value;
            if (!email.includes('@')) {
                alert('Please enter a valid email address!');
                return;
            }
            alert('✅ Message sent successfully! Thank you for contacting XENO HMIS');
            this.reset();
        });
    </script>

    <footer>
        <p><strong>HMIS - Health Management Information System</strong></p>
        <p>The British College, Kathmandu, Nepal | 
           <a href="mailto:xeno@hmis.edu.np">xeno@hmis.edu.np</a></p>
        <p>&copy; 2026 Xeno. All Rights Reserved.</p>

            <a href="index.html">Home</a> | 
            <a href="about.html">About</a> | 
            <a href="patients.html">Patients</a> | 
            <a href="gallery.html">Gallery</a> | 
            <a href="contact.html">Contact</a>  
        </p>
    </footer>
</body>
</html>
